name: CI

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m compileall -q streamlit_app.py transcribe_cli.py transcriber
      - name: Smoke test transcript helpers
        run: |
          bash -n setup_unix.sh
          python - <<'PY'
          from transcriber.formats import Segment, segments_to_paragraphs, segments_to_txt
          
          segments = [
              Segment(start=0.0, end=1.0, text=" Hello "),
              Segment(start=1.0, end=2.0, text="world", speaker="Speaker 1"),
          ]
          
          assert segments_to_txt(segments) == "Hello\nworld\n"
          paragraphs = segments_to_paragraphs(segments)
          assert "Speaker 1: world" in paragraphs
          print("smoke ok")
          PY
      - name: Output format test
        run: |
          python - <<'PY'
          from transcriber.formats import Segment, segments_to_srt, segments_to_txt_timestamps, segments_to_vtt
          
          segments = [
              Segment(start=0.0, end=1.25, text="Hello", speaker="Speaker 1"),
              Segment(start=61.5, end=62.0, text="Bye"),
          ]
          
          assert segments_to_srt(segments) == (
              "1\n"
              "00:00:00,000 --> 00:00:01,250\n"
              "Speaker 1: Hello\n\n"
              "2\n"
              "00:01:01,500 --> 00:01:02,000\n"
              "Bye\n"
          )
          assert segments_to_vtt(segments) == (
              "WEBVTT\n\n"
              "00:00:00.000 --> 00:00:01.250\n"
              "Speaker 1: Hello\n\n"
              "00:01:01.500 --> 00:01:02.000\n"
              "Bye\n"
          )
          assert segments_to_txt_timestamps(segments) == (
              "00:00:00 Speaker 1\n"
              "Hello\n"
              "00:01:01\n"
              "Bye\n"
          )
          print("format ok")
          PY
      - name: Unit and smoke tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
